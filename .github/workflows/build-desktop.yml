name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.12.0). Leave empty to build artifacts only."
        required: false
        type: string
      notarize:
        description: "Notarize macOS builds (requires Apple credentials)"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create GitHub Release as draft"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Parse inputs and expose them as outputs for downstream jobs
  # ──────────────────────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      has_tag: ${{ steps.meta.outputs.has_tag }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      notarize: ${{ steps.meta.outputs.notarize }}
    steps:
      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.tag }}"
          if [ -n "$tag" ]; then
            echo "has_tag=true"           >> "$GITHUB_OUTPUT"
            echo "release_tag=$tag"       >> "$GITHUB_OUTPUT"
            echo "release_name=AuroWork $tag" >> "$GITHUB_OUTPUT"
          else
            echo "has_tag=false"          >> "$GITHUB_OUTPUT"
            echo "release_tag="           >> "$GITHUB_OUTPUT"
            echo "release_name="          >> "$GITHUB_OUTPUT"
          fi

          echo "draft=${{ inputs.draft }}"           >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ inputs.prerelease }}"  >> "$GITHUB_OUTPUT"
          echo "notarize=${{ inputs.notarize }}"      >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # Job 2: Create GitHub Release (only when tag is provided)
  # ──────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: prepare
    if: needs.prepare.outputs.has_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.prepare.outputs.release_tag }}"
          NAME="${{ needs.prepare.outputs.release_name }}"

          # Check if release already exists
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi

          flags=()
          if [ "${{ needs.prepare.outputs.draft }}" = "true" ]; then
            flags+=( --draft )
          fi
          if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
            flags+=( --prerelease )
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$NAME" \
            --notes "Desktop build for $TAG" \
            --target "${{ github.sha }}" \
            "${flags[@]}"

  # ──────────────────────────────────────────────────────────────
  # Job 3: Build desktop app (3-platform matrix)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [prepare, create-release]
    # Run even when create-release is skipped (no tag)
    if: always() && needs.prepare.result == 'success'
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 180

    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
      HAS_TAG: ${{ needs.prepare.outputs.has_tag }}
      NOTARIZE: ${{ needs.prepare.outputs.notarize }}
      OPENCODE_GITHUB_REPO: ${{ vars.OPENCODE_GITHUB_REPO || 'anomalyco/opencode' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            os_type: macos
            target: aarch64-apple-darwin
            opencode_asset: opencode-darwin-arm64.zip
            bundles: "dmg,app"
          - platform: macos-14
            os_type: macos
            target: x86_64-apple-darwin
            opencode_asset: opencode-darwin-x64-baseline.zip
            bundles: "dmg,app"
          - platform: windows-2022
            os_type: windows
            target: x86_64-pc-windows-msvc
            opencode_asset: opencode-windows-x64-baseline.zip
            bundles: "msi"

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      # ── Windows: enable long paths ───────────────────────────
      - name: Enable long paths (Windows)
        if: matrix.os_type == 'windows'
        shell: bash
        run: git config --global core.longpaths true

      # ── Toolchain setup ──────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.6"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Caching ──────────────────────────────────────────────
      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ matrix.os_type }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.os_type }}-pnpm-

      - name: Cache cargo
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os_type }}-${{ matrix.target }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os_type }}-${{ matrix.target }}-cargo-

      # ── Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install OpenTUI x64 core (macOS x86_64 cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: pnpm add -w --ignore-workspace-root-check @opentui/core-darwin-x64@0.1.77

      # ── Download OpenCode sidecar ────────────────────────────
      - name: Resolve OpenCode version
        id: opencode-version
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const parsed = JSON.parse(fs.readFileSync('./constants.json', 'utf8'));
          const version = String(parsed.opencodeVersion || '').replace(/^v/, '').trim();
          if (!version) {
            throw new Error('Pinned OpenCode version is missing from constants.json');
          }
          console.log('version=' + version);
          NODE

      - name: Download OpenCode sidecar
        shell: bash
        env:
          PINNED_OPENCODE_VERSION: ${{ steps.opencode-version.outputs.version }}
        run: |
          set -euo pipefail

          repo="${OPENCODE_GITHUB_REPO:-anomalyco/opencode}"
          asset="${{ matrix.opencode_asset }}"
          url="https://github.com/${repo}/releases/download/v${PINNED_OPENCODE_VERSION}/${asset}"

          tmp_dir="$RUNNER_TEMP/opencode"
          extract_dir="$tmp_dir/extracted"
          rm -rf "$tmp_dir"
          mkdir -p "$extract_dir"

          echo "Downloading ${url} ..."
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 -o "$tmp_dir/$asset" "$url"

          if [[ "$asset" == *.tar.gz ]]; then
            tar -xzf "$tmp_dir/$asset" -C "$extract_dir"
          else
            if command -v unzip >/dev/null 2>&1; then
              unzip -q "$tmp_dir/$asset" -d "$extract_dir"
            elif command -v 7z >/dev/null 2>&1; then
              7z x "$tmp_dir/$asset" -o"$extract_dir" >/dev/null
            else
              echo "No unzip utility available" >&2
              exit 1
            fi
          fi

          # Locate the extracted binary
          if [ -f "$extract_dir/opencode" ]; then
            bin_path="$extract_dir/opencode"
          elif [ -f "$extract_dir/opencode.exe" ]; then
            bin_path="$extract_dir/opencode.exe"
          else
            echo "OpenCode binary not found in archive" >&2
            ls -la "$extract_dir"
            exit 1
          fi

          target_name="opencode-${{ matrix.target }}"
          if [ "${{ matrix.os_type }}" = "windows" ]; then
            target_name="${target_name}.exe"
          fi

          mkdir -p apps/desktop/src-tauri/sidecars
          cp "$bin_path" "apps/desktop/src-tauri/sidecars/${target_name}"
          chmod 755 "apps/desktop/src-tauri/sidecars/${target_name}"

      # ── Build: with release (tag provided) ───────────────────
      - name: Write notary API key
        if: matrix.os_type == 'macos' && env.NOTARIZE == 'true'
        env:
          APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_NOTARY_API_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"
          echo "NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build + publish to release (notarized)
        if: env.HAS_TAG == 'true' && matrix.os_type == 'macos' && env.NOTARIZE == 'true'
        uses: tauri-apps/tauri-action@v0.5.17
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          APPLE_API_KEY_PATH: ${{ env.NOTARY_KEY_PATH }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: "Desktop build for ${{ env.RELEASE_TAG }}"
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          releaseDraft: ${{ needs.prepare.outputs.draft == 'true' }}
          projectPath: apps/desktop
          tauriScript: pnpm exec tauri -vvv
          args: "--target ${{ matrix.target }} --bundles ${{ matrix.bundles }}"
          retryAttempts: 3

      - name: Build + publish to release
        if: env.HAS_TAG == 'true' && (matrix.os_type != 'macos' || env.NOTARIZE != 'true')
        uses: tauri-apps/tauri-action@v0.5.17
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: "Desktop build for ${{ env.RELEASE_TAG }}"
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          releaseDraft: ${{ needs.prepare.outputs.draft == 'true' }}
          projectPath: apps/desktop
          tauriScript: pnpm exec tauri -vvv
          args: "--target ${{ matrix.target }} --bundles ${{ matrix.bundles }}"
          retryAttempts: 3

      # ── Build: artifact-only (no tag) ────────────────────────
      - name: Build desktop app (artifact-only)
        if: env.HAS_TAG != 'true'
        shell: bash
        run: |
          pnpm --filter @aurowork/desktop exec tauri build \
            --config src-tauri/tauri.conf.ci.json \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundles }}

      - name: Upload artifact (macOS)
        if: env.HAS_TAG != 'true' && matrix.os_type == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: aurowork-${{ matrix.target }}-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload artifact (Windows)
        if: env.HAS_TAG != 'true' && matrix.os_type == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: aurowork-${{ matrix.target }}-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
