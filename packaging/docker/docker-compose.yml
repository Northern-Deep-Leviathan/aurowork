services:
  aurowork-host:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep this in sync with apps/orchestrator/package.json if you want a pinned release.
        AUROWORK_ORCHESTRATOR_VERSION: 0.11.22
    ports:
      - "8787:8787"
    environment:
      # Set these explicitly for stable sharing.
      # AUROWORK_TOKEN: "..."
      # AUROWORK_HOST_TOKEN: "..."
      # Optional: AUROWORK_APPROVAL_MODE: "auto"
      # Optional: AUROWORK_APPROVAL_TIMEOUT_MS: "30000"
      AUROWORK_DATA_DIR: /data/aurowork-orchestrator
      AUROWORK_SIDECAR_DIR: /data/sidecars
    volumes:
      # Mount an existing project/workspace here.
      - ./workspace:/workspace
      # Persistent host data (OpenCode caches, server config, tokens).
      - ./data:/data
